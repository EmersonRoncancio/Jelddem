<section class="py-20 bg-gradient-to-b from-white to-gray-50">
  <div class="container mx-auto px-4">
    <!-- Título -->
    <div class="text-center mb-16">
      <h2 class="text-4xl md:text-5xl font-bold mb-4" style="color: #902bcc;">
        Ellos depositaron su confianza en nosotros
      </h2>
      <p class="text-gray-600 text-lg max-w-2xl mx-auto">
        Colaboramos con empresas líderes para impulsar su transformación digital
      </p>
    </div>

    <!-- Carrusel de Logos -->
    <div class="relative overflow-hidden">
      <!-- Gradientes para fade effect -->
      <div class="absolute left-0 top-0 bottom-0 w-32 bg-gradient-to-r from-white to-transparent z-10"></div>
      <div class="absolute right-0 top-0 bottom-0 w-32 bg-gradient-to-l from-white to-transparent z-10"></div>

      <!-- Contenedor del carrusel -->
      <div class="flex animate-scroll items-center">
        @for (company of repeatedCompanies; track company.name) {
          <a [attr.href]="company.url" target="_blank" rel="noopener noreferrer" class="flex-shrink-0 flex items-center justify-center group min-w-[200px] px-8">
            <img
              [attr.src]="company.logo"
              [attr.alt]="company.name"
              class="h-24 md:h-28 w-auto max-w-[200px] object-contain opacity-70 group-hover:opacity-100 transition-all duration-300 filter grayscale group-hover:grayscale-0 group-hover:scale-110 cursor-pointer"
            />
          </a>
        }
      </div>
    </div>
  </div>
</section>

<style>
  @keyframes scroll {
    0% {
      transform: translateX(0);
    }
    100% {
      transform: translateX(-50%);
    }
  }

  .animate-scroll {
    animation: scroll 40s linear infinite;
  }

  .animate-scroll:hover {
    animation-play-state: paused;
  }
</style>
